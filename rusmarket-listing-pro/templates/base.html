<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RusMarket Listing Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body id="body">
    <header class="app-header">
        <div class="header-container">
            <h1 data-i18n="appTitle" class="app-title">✨ RusMarket Pro</h1>
            <div class="language-bar">
                <button class="lang-btn active" data-lang="EN" onclick="setLanguage('EN')">🇬🇧 EN</button>
                <button class="lang-btn" data-lang="RU" onclick="setLanguage('RU')">🇷🇺 RU</button>
                <button class="lang-btn" data-lang="TR" onclick="setLanguage('TR')">🇹🇷 TR</button>
                <button class="lang-btn" data-lang="ZH" onclick="setLanguage('ZH')">🇨🇳 ZH</button>
                <button class="lang-btn" data-lang="BN" onclick="setLanguage('BN')">🇧🇩 BN</button>
            </div>
        </div>
    </header>
    <main class="app-main">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
