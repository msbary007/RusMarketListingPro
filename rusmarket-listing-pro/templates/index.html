<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RusMarket Listing Pro - Multilingual AI Optimizer (V9.1)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        /* Language Selector Styling */
        .language-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 50px;
        }
        
        .lang-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 30px;
            background: transparent;
            color: #666;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .lang-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }
        
        /* Bengali Font Support */
        .bn {
            font-family: 'Noto Sans Bengali', Arial, sans-serif;
        }
        
        select, textarea, button {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        textarea {
            width: 100%;
            resize: vertical;
        }
        
        select:focus, textarea:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        button#analyzeBtn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            padding: 12px 30px;
        }
        
        button#analyzeBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        
        button#analyzeBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        .example-box {
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .score-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }
        
        .score-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .score-value {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
            transition: color 0.3s;
        }
        
        .score-high { color: #2ecc71; }
        .score-medium { color: #f39c12; }
        .score-low { color: #e74c3c; }
        
        .progress-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.8s ease-out;
            width: 0%;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .tab-btn {
            background: #f0f0f0;
            color: #666;
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .tab-content {
            display: none;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .tab-content.active {
            display: block;
        }
        
        .action-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        
        .btn-small {
            padding: 8px 15px;
            font-size: 14px;
            background: #f0f0f0;
            color: #666;
            border: 1px solid #ddd;
            cursor: pointer;
            border-radius: 8px;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #999;
        }
        
        .empty-state p {
            margin-top: 10px;
            font-size: 14px;
        }
        
        .error-item {
            padding: 10px;
            background: #fff3f3;
            border-left: 4px solid #ff4444;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        
        .tip-item {
            background: #f0f7ff;
            border-left-color: #2196F3;
        }
        
        .trust-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 5px 15px;
            border-radius: 20px;
            margin: 5px;
            font-size: 14px;
            border: 1px solid #c8e6c9;
            animation: popIn 0.3s ease-out;
        }
        
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .chat-container {
            margin-top: 30px;
            border-top: 2px solid #f0f0f0;
            padding-top: 30px;
        }
        
        .chat-messages {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .message {
            padding: 10px 18px;
            border-radius: 18px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .message.user {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #1565c0;
        }
        
        .message.ai {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #eee;
            color: #444;
            padding-left: 45px;
        }

        .message.ai::before {
            content: '🤖';
            position: absolute;
            left: 10px;
            top: 10px;
            font-size: 20px;
        }

        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
            background: #f0f0f0;
            border-radius: 18px;
            align-self: flex-start;
            width: fit-content;
            margin-bottom: 10px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        
        .word-counter {
            text-align: right;
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body id="body">

            <button class="lang-btn" id="lang-bn" onclick="setLanguage('bn')">🇧🇩 BN</button>
        </div>

        <h1 id="appTitle">RusMarket Listing Pro</h1>
        <p class="subtitle" id="appSubtitle">AI-Powered Optimization for Russian E-commerce</p>
        
        <!-- Example Selector -->
        <div class="example-box">
            <label id="exampleLabel">📋 Load Example Listing</label>
            <select id="exampleSelect" style="width: 100%;">
                <option value="" id="examplePlaceHolder">Select an example...</option>
                <option value="iphone">📱 iPhone 11 - Electronics</option>
                <option value="dress">👗 Dress - Clothing</option>
                <option value="airpods">🎧 AirPods - Electronics</option>
            </select>
        </div>
        
        <!-- Input Form -->
        <div class="form-group">
            <label id="descriptionLabel">Product Description</label>
            <textarea id="listingText" rows="6" placeholder="Paste your Russian listing here...">Продам айфон 11 64 гб. Состояние хорошее, батарея 85%. Оригинал.</textarea>
            <div class="word-counter" id="wordCount">Words: 8 | Characters: 62</div>
        </div>
        
        <div class="form-group">
            <label id="categoryLabel">Category</label>
            <select id="categorySelect" style="width: 100%;">
                <option value="electronics" id="cat-electronics">Electronics & Gadgets</option>
                <option value="clothing" id="cat-clothing">Clothing & Fashion</option>
                <option value="cosmetics" id="cat-cosmetics">Beauty & Cosmetics</option>
                <option value="household" id="cat-household">Home & Household</option>
                <option value="general" id="cat-general">General Analysis</option>
            </select>
        </div>
        
        <button id="analyzeBtn" style="width: 100%;">Analyze & Optimize</button>
        
        <!-- Results Section -->
        <div id="resultsSection">
            <div class="score-container">
                <div class="score-card">
                    <h3 id="origScoreLabel">Original Score</h3>
                    <div class="score-value" id="originalScore">0</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="originalProgress"></div>
                    </div>
                </div>
                <div class="score-card">
                    <h3 id="optScoreLabel">Optimized Score</h3>
                    <div class="score-value" id="optimizedScore">0</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="optimizedProgress"></div>
                    </div>
                </div>
            </div>
            
            <div style="text-align: right; margin-bottom: 20px;">
                <button class="btn-small" id="downloadJsonBtn">Download JSON Report</button>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="original" id="tab-orig">Original</button>
                <button class="tab-btn" data-tab="optimized" id="tab-opt">Optimized</button>
                <button class="tab-btn" data-tab="errors" id="tab-err">Grammar Fixes</button>
            </div>
            
            <div id="originalTab" class="tab-content active">
                <div class="action-group">
                    <button class="btn-small" id="copyOriginal">Copy</button>
                </div>
                <textarea id="originalOutput" readonly rows="6"></textarea>
            </div>
            
            <div id="optimizedTab" class="tab-content">
                <div class="action-group">
                    <button class="btn-small" id="copyOptimized">Copy</button>
                </div>
                <textarea id="optimizedOutput" readonly rows="6"></textarea>
            </div>
            
            <div id="errorsTab" class="tab-content">
                <div class="action-group">
                    <button class="btn-small" id="copyErrors">Copy</button>
                </div>
                <div id="errorsList">
                    <div class="empty-state">
                        <div style="font-size: 48px;">📝</div>
                        <p id="emptyMsg">No text to analyze. Please paste a Russian listing above.</p>
                    </div>
                </div>
            </div>
            
            <div style="margin-top: 20px; padding: 20px; background: #f0f7ff; border-radius: 10px;">
                <h3 id="trustLabel">✨ Trust Signals</h3>
                <div id="trustSignals"></div>
            </div>
        </div>
        
        <!-- Chat Section -->
        <div class="chat-container">
            <h3 id="chatTitle">🤖 AI Assistant</h3>
            <div class="chat-messages" id="chatMessages">
                <div class="message ai" id="start-msg">Привет! I'm ready to help with your listing.</div>
            </div>
            <div class="chat-input-group">
                <input type="text" id="chatInput" placeholder="Type your message...">
                <button id="sendChatBtn">Send</button>
            </div>
        </div>
    </div>

                errCapital: "✏️ বাক্য বড় হাতের অক্ষর দিয়ে শুরু করুন।",
                errPeriod: "✏️ বাক্যের শেষে দাঁড়ি বা প্রশ্নবোধক চিহ্ন যোগ করুন।",
                errSpaces: "✏️ অতিরিক্ত স্পেস মুছে ফেলুন।",
                errRussian: "✏️ 'গিগাবাইট' বা 'GB' ব্যবহার করা বেশি পেশাদার দেখায়।",
                errIphone: "✏️ 'আইফোন' এর বদলে 'iPhone' ব্যবহার করার চেষ্টা করুন।",
                tipLength: "💡 আপনার বর্ণনা কিছুটা সংক্ষিপ্ত। পণ্যটির অবস্থা সম্পর্কে আরও তথ্য যোগ করুন।",
                tipTrust: "💡 ক্রেতার আস্থা বাড়াতে 'অরিজিনাল' শব্দটি উল্লেখ করুন।",
                // Trust Signal Translations
                sigOriginal: "✅ অরিজিনাল",
                sigBattery: "🔋 ব্যাটারি চেক করা",
                sigBox: "📦 অরিজিনাল বক্স",
                sigShipping: "⚡ দ্রুত শিপিং",
                sigNegotiable: "💬 দাম আলোচনা সাপেক্ষ",
                sigNoDefects: "👗 ত্রুটিমুক্ত",
                sigAsNew: "✨ নতুনের মতো",
                sigFabric: "🧵 উন্নত মানের কাপড়",
                sigSize: "📏 সঠিক সাইজ",
                sigMeetup: "🤝 সরাসরি সাক্ষাৎ",
                sigVerified: "✅ যাচাইকৃত",
                sigCondition: "👍 ভালো অবস্থা",
                sigPacking: "📦 উন্নত প্যাকিং",
                sigDiscount: "💬 ডিসকাউন্ট",
                sigFastReply: "⚡ দ্রুত উত্তর",
                errNone: "✨ কোনো ত্রুটি পাওয়া যায়নি!"
            },
        };

        let currentLang = 'en';

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`lang-${lang}`).classList.add('active');
            
            if (lang === 'bn') document.getElementById('mainContainer').classList.add('bn');
            else document.getElementById('mainContainer').classList.remove('bn');

            const t = translations[lang];
            document.getElementById('appTitle').innerText = t.appTitle;
            document.getElementById('appSubtitle').innerText = t.appSubtitle;
            document.getElementById('exampleLabel').innerText = t.exampleLabel;
            document.getElementById('examplePlaceHolder').innerText = t.examplePlaceHolder;
            document.getElementById('descriptionLabel').innerText = t.descriptionLabel;
            document.getElementById('categoryLabel').innerText = t.categoryLabel;
            document.getElementById('cat-electronics').innerText = t.catElectronics;
            document.getElementById('cat-clothing').innerText = t.catClothing;
            document.getElementById('cat-cosmetics').innerText = t.catCosmetics;
            document.getElementById('cat-household').innerText = t.catHousehold;
            document.getElementById('cat-general').innerText = t.catGeneral;
            document.getElementById('analyzeBtn').innerText = t.analyzeBtn;
            document.getElementById('origScoreLabel').innerText = t.origScoreLabel;
            document.getElementById('optScoreLabel').innerText = t.optScoreLabel;
            document.getElementById('tab-orig').innerText = t.tabOrig;
            document.getElementById('tab-opt').innerText = t.tabOpt;
            document.getElementById('tab-err').innerText = t.tabErr;
            document.getElementById('trustLabel').innerText = t.trustLabel;
            document.getElementById('chatTitle').innerText = t.chatTitle;
            document.getElementById('start-msg').innerText = t.startMsg;
            document.getElementById('chatInput').placeholder = t.chatPlaceholder;
            
            const emptyEl = document.getElementById('emptyMsg');
            if (emptyEl) emptyEl.innerText = t.emptyMsg;

            // Clear previous results to avoid "ghost" translations
            if (document.getElementById('listingText').value === '') {
                showEmptyState();
            }
        }

        // --- Core Logic ---
        const examples = {
            iphone: "Продам айфон 11 64 гб. Состояние хорошее, батарея 85%. Оригинал, не вскрывался. Покупал в Москве.",
            dress: "Платье женское красное, размер M. Надевала 2 раза на праздники. Ткань плотная, состояние отличное.",
            airpods: "Наушники эпл аирподс оригинал. Звук хороший, заряд держат долго. Есть чехол в подарок."
        };

        const trustSignalsDB = {
            electronics: ["sigOriginal", "sigBattery", "sigBox", "sigShipping", "sigNegotiable"],
            clothing: ["sigNoDefects", "sigAsNew", "sigFabric", "sigSize", "sigMeetup"],
            general: ["sigVerified", "sigCondition", "sigPacking", "sigDiscount", "sigFastReply"]
        };

        function setLoading(isLoading) {
            const btn = document.getElementById('analyzeBtn');
            if (isLoading) {
                btn.innerHTML = `<span class="btn-content"><span class="spinner"></span><span>${translations[currentLang].analyzing}</span></span>`;
                btn.disabled = true;
            } else {
                btn.innerHTML = translations[currentLang].analyzeBtn;
                btn.disabled = false;
            }
        }

        function showEmptyState() {
            document.getElementById('originalOutput').value = '';
            document.getElementById('optimizedOutput').value = '';
            document.getElementById('originalScore').textContent = '0';
            document.getElementById('optimizedScore').textContent = '0';
            document.getElementById('originalProgress').style.width = '0%';
            document.getElementById('optimizedProgress').style.width = '0%';
            const t = translations[currentLang];
            document.getElementById('errorsList').innerHTML = `<div class="empty-state"><div style="font-size: 48px;">📝</div><p id="emptyMsg">${t.emptyMsg}</p></div>`;
            document.getElementById('trustSignals').innerHTML = '';
        }

        function calculateScore(text, category, isOptimized = false) {
            if (!text || text.trim().length === 0) return 0;
            let score = 40;
            const length = text.length;
            if (length >= 100 && length <= 300) score += 15;
            else if (length > 300) score += 10;
            else if (length > 50) score += 5;
            const emojiCount = (text.match(/[\u{1F300}-\u{1F6FF}]/gu) || []).length;
            score += Math.min(emojiCount * 3, 10);
            const trustWords = ['оригинал', 'гарантия', 'новый', 'проверено', 'торг', 'отправка', 'доставка', 'качеств', 'работает', 'отличн', 'хорош'];
            trustWords.forEach(w => { if (text.toLowerCase().includes(w)) score += 3; });
            if (text.includes('.')) score += 3;
            if (text.includes(',')) score += 2;
            if (text[0] === text[0]?.toUpperCase()) score += 3;
            if (isOptimized) score += 15;
            return Math.min(100, Math.max(0, Math.round(score)));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg || translations[currentLang].copyMsg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function optimizeText(text) {
            let opt = text.replace(/гб/gi, 'ГБ').replace(/айфон/gi, 'Apple iPhone').replace(/оригинал/gi, 'ОРИГИНАЛ ✅');
            opt = opt.split(/[.!?]\s*/).map(s => s.trim().charAt(0).toUpperCase() + s.trim().slice(1)).join('. ');
            if (opt && !opt.endsWith('.')) opt += '.';
            return `✨ ${opt} Торг уместен. Быстрая отправка! 🚀`;
        }
        
        // --- FIXED DYNAMIC LOGIC ---
        function updateTrustSignals(text, cat) {
            const signalsBox = document.getElementById('trustSignals');
            signalsBox.innerHTML = '';
            const t = translations[currentLang];
            
            // 1. Keyword-based matching
            const keywordMap = {
                'оригинал': 'sigOriginal',
                'батарея': 'sigBattery',
                'коробка': 'sigBox',
                'торг': 'sigNegotiable',
                'новый': 'sigAsNew',
                'чек': 'sigVerified'
            };
            
            let finalLabels = [];
            for (let k in keywordMap) {
                if (text.toLowerCase().includes(k)) {
                    const key = keywordMap[k];
                    if (t[key]) finalLabels.push(t[key]);
                }
            }
            
            // 2. Category Defaults
            const defaults = trustSignalsDB[cat] || trustSignalsDB.general;
            defaults.forEach(key => {
                if (t[key] && !finalLabels.includes(t[key])) {
                    finalLabels.push(t[key]);
                }
            });
            
            // 3. Render
            finalLabels.slice(0, 6).forEach(label => {
                const span = document.createElement('span');
                span.className = 'trust-badge';
                span.innerText = label;
                signalsBox.appendChild(span);
            });
        }

        // --- Event Listeners ---
        document.getElementById('analyzeBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const text = document.getElementById('listingText').value.trim();
            const cat = document.getElementById('categorySelect').value;
            const t = translations[currentLang];

            if (!text) { 
                showEmptyState(); 
                alert(t.emptyMsg); 
                return; 
            }
            
            setLoading(true);
            setTimeout(() => {
                const opt = optimizeText(text);
                const s1 = calculateScore(text, cat, false);
                const s2 = calculateScore(opt, cat, true);
                
                document.getElementById('originalOutput').value = text;
                document.getElementById('optimizedOutput').value = opt;
                document.getElementById('originalScore').textContent = s1;
                document.getElementById('optimizedScore').textContent = s2;
                document.getElementById('originalProgress').style.width = s1 + '%';
                document.getElementById('optimizedProgress').style.width = s2 + '%';
                
                const c1 = s1 >= 80 ? 'score-high' : s1 >= 50 ? 'score-medium' : 'score-low';
                const c2 = s2 >= 80 ? 'score-high' : s2 >= 50 ? 'score-medium' : 'score-low';
                document.getElementById('originalScore').className = 'score-value ' + c1;
                document.getElementById('optimizedScore').className = 'score-value ' + c2;

                const errs = document.getElementById('errorsList');
                errs.innerHTML = '';
                const t = translations[currentLang];
                
                // 1. Universal Checks
                if (text.length > 0 && text[0] !== text[0].toUpperCase()) errs.innerHTML += `<div class="error-item">${t.errCapital}</div>`;
                if (text.length > 0 && !/[.!?]$/.test(text)) errs.innerHTML += `<div class="error-item">${t.errPeriod}</div>`;
                if (/\s\s/.test(text)) errs.innerHTML += `<div class="error-item">${t.errSpaces}</div>`;
                
                // 2. Language-Specific Checks
                if (currentLang === 'ru' || text.match(/[а-яА-Я]/)) {
                    if (text.includes('гб') && !text.includes('ГБ')) errs.innerHTML += `<div class="error-item">${t.errRussian}</div>`;
                    if (/айфон/i.test(text)) errs.innerHTML += `<div class="error-item">${t.errIphone}</div>`;
                    if (!/оригинал/i.test(text)) errs.innerHTML += `<div class="error-item tip-item">${t.tipTrust}</div>`;
                }
                
                // 3. Style Tips
                if (text.length < 50) errs.innerHTML += `<div class="error-item tip-item">${t.tipLength}</div>`;
                
                // 4. Empty State Fallback
                if (errs.innerHTML === '') {
                    errs.innerHTML = `<div class="empty-state">✨ <p>${t.errNone}</p></div>`;
                }
                
                // 5. Update Trust Signals (Pass t to ensure local scope use if needed, but function uses currentLang)
                updateTrustSignals(text, cat);

                setLoading(false);
                showToast('Success!');
            }, 1000);
        });

        document.getElementById('exampleSelect').addEventListener('change', (e) => {
            const val = e.target.value;
            if (examples[val]) {
                document.getElementById('listingText').value = examples[val];
                document.getElementById('listingText').dispatchEvent(new Event('input'));
            }
        });

        document.getElementById('listingText').addEventListener('input', (e) => {
            const text = e.target.value;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('wordCount').innerText = `Words: ${words} | Characters: ${text.length}`;
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
            });
        });

        document.getElementById('copyOriginal').onclick = () => { navigator.clipboard.writeText(document.getElementById('originalOutput').value).then(() => showToast()); };
        document.getElementById('copyOptimized').onclick = () => { navigator.clipboard.writeText(document.getElementById('optimizedOutput').value).then(() => showToast()); };
        document.getElementById('copyErrors').onclick = () => { 
            const txt = Array.from(document.getElementById('errorsList').querySelectorAll('.error-item')).map(e => e.innerText).join('\n');
            navigator.clipboard.writeText(txt).then(() => showToast()); 
        };

        // --- UPGRADED CHAT LOGIC (V10) ---
        function addMessage(text, sender) {
            const msgs = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `<div>${text}</div><span class="message-time">${time}</span>`;
            
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
            return div;
        }

        function showTyping() {
            const msgs = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'typing';
            div.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
            return div;
        }

        function getContextAdvice(userMsg) {
            const text = document.getElementById('listingText').value.trim();
            const score = parseInt(document.getElementById('optimizedScore').textContent) || 0;
            const cat = document.getElementById('categorySelect').value;
            const t = translations[currentLang];
            
            const msg = userMsg.toLowerCase();
            
            if (msg.includes('score') || msg.includes('балл') || msg.includes('স্কোর') || msg.includes('improve')) {
                if (score < 80) return t.adviceScore;
                return t.aiResponse;
            }
            
            if (msg.includes('help') || msg.includes('помоги') || msg.includes('সাহায্য')) {
                const hints = {
                    electronics: currentLang === 'bn' ? 'ব্যাটারির স্থিতি' : (currentLang === 'ru' ? 'состоянии батареи' : 'battery health'),
                    clothing: currentLang === 'bn' ? 'সাইজ এবং উপাদান' : (currentLang === 'ru' ? 'размерах и материале' : 'sizes and material'),
                    cosmetics: currentLang === 'bn' ? 'মেয়াদ শেষের তারিখ' : (currentLang === 'ru' ? 'сроке годности' : 'expiration date'),
                    household: currentLang === 'bn' ? 'অবস্থা এবং আকার' : (currentLang === 'ru' ? 'состоянии и габаритах' : 'condition and dimensions'),
                    general: currentLang === 'bn' ? 'শিপিং' : (currentLang === 'ru' ? 'доставке' : 'shipping')
                };
                return t.adviceCat.replace('{cat}', t['cat' + cat.charAt(0).toUpperCase() + cat.slice(1)]).replace('{hint}', hints[cat] || hints.general);
            }

            return t.aiResponse;
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            addMessage(msg, 'user');
            input.value = '';
            
            const typing = showTyping();
            
            setTimeout(() => {
                typing.remove();
                const advice = getContextAdvice(msg);
                addMessage(advice, 'ai');
            }, 1200);
        }

        document.getElementById('sendChatBtn').onclick = sendChatMessage;
        document.getElementById('chatInput').onkeypress = (e) => { if (e.key === 'Enter') sendChatMessage(); };

        document.getElementById('downloadJsonBtn').onclick = () => {
            const r = {
                original: document.getElementById('originalOutput').value,
                optimized: document.getElementById('optimizedOutput').value,
                scores: { orig: document.getElementById('originalScore').innerText, opt: document.getElementById('optimizedScore').innerText },
                trust_signals: Array.from(document.querySelectorAll('.trust-badge')).map(b => b.innerText)
            };
            const b = new Blob([JSON.stringify(r, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = 'RM_Report.json';
            a.click();
        };

        // Initialize word count and language
        setLanguage('ru');
        document.getElementById('listingText').dispatchEvent(new Event('input'));
    </script>
</body>
</html>
